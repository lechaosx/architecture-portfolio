# Pages CMS config — https://pagescms.org
#
# Setup: go to https://app.pagescms.org, sign in with GitHub, and grant the
# Pages CMS GitHub App access to this repo. That's it — no server or OAuth proxy
# to run. The architect edits content in the browser; saving commits to `master`,
# which triggers the GitHub Pages deploy.
#
# The site is bilingual (Czech + English). Fields that differ per language come
# in pairs suffixed _cs / _en; language-neutral fields (images, year, email,
# phone) are single. See FEATURES.md "Dual language (Czech + English)".

media:
  input: public/uploads # uploaded files are committed here
  output: /uploads # ...and referenced by this path (served from site root)

content:
  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    filename: '{fields.title_en}.md' # slugified from the English title
    view:
      fields: [title_en, year, location_en]
    fields:
      - { name: title_cs, label: Title (Czech), type: string }
      - { name: title_en, label: Title (English), type: string }
      - { name: year, label: Year, type: number }
      - { name: location_cs, label: Location (Czech), type: string, required: false }
      - { name: location_en, label: Location (English), type: string, required: false }
      - { name: draft, label: Draft (hide from site), type: boolean, default: false }
      - { name: cover, label: Cover image, type: image }
      - { name: gallery, label: Gallery, type: image, list: true }
      - { name: body_cs, label: Description (Czech), type: rich-text }
      - { name: body_en, label: Description (English), type: rich-text }

  - name: home
    label: Home page
    type: file
    path: src/content/singletons/home.md
    fields:
      - { name: portrait, label: Portrait, type: image, required: false }
      - name: gallery
        label: Gallery images (leave empty to use project photos)
        type: image
        list: true
      - name: approaches
        label: Approach
        type: object
        list: true
        fields:
          - { name: label_cs, label: Label (Czech), type: string }
          - { name: label_en, label: Label (English), type: string }
          - { name: text_cs, label: Text (Czech), type: text }
          - { name: text_en, label: Text (English), type: text }
          - name: icon
            label: Icon
            type: select
            options:
              values: [place, scale, material, thinking]
      - { name: body_cs, label: About text (Czech), type: rich-text }
      - { name: body_en, label: About text (English), type: rich-text }

  - name: contact
    label: Contact
    type: file
    path: src/content/singletons/contact.md
    fields:
      - { name: email, label: Email, type: string }
      - { name: phone, label: Phone, type: string, required: false }
      - name: hours
        label: When I'm reachable (per day)
        type: object
        list: true
        fields:
          - { name: day_cs, label: Day (Czech), type: string }
          - { name: day_en, label: Day (English), type: string }
          - { name: hours, label: Hours (e.g. 10:00 – 15:00, or —), type: string }

  - name: site
    label: Site settings
    type: file
    path: src/content/singletons/site.md
    fields:
      - { name: name, label: Name, type: string }
      - { name: credential, label: Credential (e.g. Ing. arch.), type: string }
      - { name: description_cs, label: SEO description (Czech), type: text }
      - { name: description_en, label: SEO description (English), type: text }
